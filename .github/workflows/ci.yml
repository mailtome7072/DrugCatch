name: CI - PR 체크

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  test:
    name: 백엔드 테스트
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: 의존성 설치
        run: |
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          else
            echo "requirements.txt 없음, 스킵"
          fi

      - name: pytest 실행
        env:
          JWT_SECRET: test-jwt-secret-for-ci
          SECRET_KEY: test-secret-key-for-ci
        run: |
          if [ -d backend/tests ]; then
            pytest backend/tests/ -v --tb=short
          else
            echo "테스트 없음, 스킵"
          fi

  build:
    name: Docker 빌드 확인
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 백엔드 이미지 빌드 테스트
        run: |
          if [ -f docker/backend/Dockerfile.prod ]; then
            docker build -f docker/backend/Dockerfile.prod --target runtime -t app-backend:test .
          else
            echo "Dockerfile 없음, 스킵"
          fi

      - name: 프론트엔드 이미지 빌드 테스트
        run: |
          if [ -f docker/frontend/Dockerfile.prod ]; then
            docker build -f docker/frontend/Dockerfile.prod --target runtime -t app-frontend:test .
          else
            echo "Dockerfile 없음, 스킵"
          fi
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
