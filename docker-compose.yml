services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.prod
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
